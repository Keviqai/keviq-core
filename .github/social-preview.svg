<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
  </g>

  <!-- Left side: text -->
  <text x="80" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="700" fill="#f8fafc">Keviq Core</text>
  <text x="80" y="270" font-family="system-ui, sans-serif" font-size="28" fill="#94a3b8">Open-source infrastructure for</text>
  <text x="80" y="310" font-family="system-ui, sans-serif" font-size="28" fill="#94a3b8">running AI agents in production</text>
  
  <!-- Tags -->
  <rect x="80" y="360" width="160" height="36" rx="18" fill="#1e40af" opacity="0.6"/>
  <text x="160" y="384" font-family="system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">15 Services</text>
  
  <rect x="260" y="360" width="120" height="36" rx="18" fill="#065f46" opacity="0.6"/>
  <text x="320" y="384" font-family="system-ui, sans-serif" font-size="16" fill="#6ee7b7" text-anchor="middle">Python</text>
  
  <rect x="400" y="360" width="150" height="36" rx="18" fill="#065f46" opacity="0.6"/>
  <text x="475" y="384" font-family="system-ui, sans-serif" font-size="16" fill="#6ee7b7" text-anchor="middle">TypeScript</text>
  
  <rect x="570" y="360" width="120" height="36" rx="18" fill="#7c2d12" opacity="0.6"/>
  <text x="630" y="384" font-family="system-ui, sans-serif" font-size="16" fill="#fdba74" text-anchor="middle">MIT</text>

  <!-- Right side: simplified architecture -->
  <g transform="translate(780, 120)">
    <!-- API Gateway -->
    <rect x="120" y="0" width="180" height="44" rx="8" fill="#1e40af" opacity="0.8"/>
    <text x="210" y="28" font-family="monospace" font-size="14" fill="#93c5fd" text-anchor="middle">API Gateway</text>
    
    <!-- Services row 1 -->
    <rect x="0" y="80" width="140" height="40" rx="6" fill="#334155"/>
    <text x="70" y="106" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">orchestrator</text>
    
    <rect x="160" y="80" width="140" height="40" rx="6" fill="#334155"/>
    <text x="230" y="106" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">agent-runtime</text>
    
    <rect x="320" y="80" width="140" height="40" rx="6" fill="#334155"/>
    <text x="390" y="106" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">auth-service</text>
    
    <!-- Services row 2 -->
    <rect x="0" y="150" width="140" height="40" rx="6" fill="#334155"/>
    <text x="70" y="176" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">event-store</text>
    
    <rect x="160" y="150" width="140" height="40" rx="6" fill="#334155"/>
    <text x="230" y="176" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">artifact-svc</text>
    
    <rect x="320" y="150" width="140" height="40" rx="6" fill="#334155"/>
    <text x="390" y="176" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">model-gateway</text>
    
    <!-- Services row 3 -->
    <rect x="80" y="220" width="140" height="40" rx="6" fill="#334155"/>
    <text x="150" y="246" font-family="monospace" font-size="12" fill="#cbd5e1" text-anchor="middle">+ 9 more</text>
    
    <!-- Infra -->
    <rect x="60" y="300" width="120" height="36" rx="6" fill="#92400e" opacity="0.5"/>
    <text x="120" y="324" font-family="monospace" font-size="13" fill="#fbbf24" text-anchor="middle">PostgreSQL</text>
    
    <rect x="200" y="300" width="120" height="36" rx="6" fill="#991b1b" opacity="0.5"/>
    <text x="260" y="324" font-family="monospace" font-size="13" fill="#fca5a5" text-anchor="middle">Redis</text>
    
    <!-- Connection lines -->
    <line x1="210" y1="44" x2="70" y2="80" stroke="#475569" stroke-width="1.5"/>
    <line x1="210" y1="44" x2="230" y2="80" stroke="#475569" stroke-width="1.5"/>
    <line x1="210" y1="44" x2="390" y2="80" stroke="#475569" stroke-width="1.5"/>
    <line x1="70" y1="120" x2="70" y2="150" stroke="#475569" stroke-width="1"/>
    <line x1="230" y1="120" x2="230" y2="150" stroke="#475569" stroke-width="1"/>
    <line x1="390" y1="120" x2="390" y2="150" stroke="#475569" stroke-width="1"/>
    <line x1="120" y1="260" x2="120" y2="300" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>
    <line x1="260" y1="260" x2="260" y2="300" stroke="#475569" stroke-width="1" stroke-dasharray="4"/>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="600" width="1280" height="40" fill="#020617"/>
  <text x="80" y="626" font-family="monospace" font-size="16" fill="#64748b">github.com/Keviqai/keviq-core</text>
  <text x="1200" y="626" font-family="monospace" font-size="16" fill="#64748b" text-anchor="end">v0.1.0-alpha</text>
</svg>
