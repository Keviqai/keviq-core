name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below so we can reproduce and fix the issue.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what happened.
      placeholder: When I try to create a task, the API returns 500...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `./scripts/bootstrap.sh`
        2. Register a user via API
        3. POST /v1/tasks/draft with body {...}
        4. Observe error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any error messages, stack traces, or log output.
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your setup details.
      placeholder: |
        - OS: Ubuntu 22.04 / macOS 14 / Windows 11
        - Docker: 24.x with Compose v2
        - Node: 22.x
        - Python: 3.12
        - Branch/commit: master @ abc1234
    validations:
      required: true
