      - no-new-privileges:true

  execution-service:
    ports: !reset []
    volumes: !reset []
    environment:
      APP_ENV: production
      DEPLOYMENT_PROFILE: hardened
      EXECUTION_BACKEND: noop
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
