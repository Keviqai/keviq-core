# Hardened overlay — production-like security posture for staging/CI.
#
# Requires Docker Compose v2.24.6+ (for !reset YAML tag support).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.hardened.yml up
#
# Changes from base:
#   - Internal service ports stripped (only api-gateway, sse-gateway, web exposed)
#   - APP_ENV=production
#   - Docker socket NOT mounted (execution-service uses noop backend)
#   - Read-only root filesystem where possible
#   - no-new-privileges security opt
#   - Postgres/Redis ports stripped (no host access)

services:
  # ── Infrastructure: no host port bindings ─────────────────────
  postgres:
    ports: !reset []

  redis:
    ports: !reset []

  # ── Internal services: hardened, no host ports ────────────────
  auth-service:
    ports: !reset []
    environment:
      APP_ENV: production
      DEPLOYMENT_PROFILE: hardened
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  policy-service:
    ports: !reset []
    environment:
      APP_ENV: production
      DEPLOYMENT_PROFILE: hardened
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

  orchestrator:
    ports: !reset []
    environment:
      APP_ENV: production
      DEPLOYMENT_PROFILE: hardened
    read_only: true
    tmpfs:
